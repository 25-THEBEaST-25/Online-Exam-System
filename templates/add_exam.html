<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Exam — ExamCloud</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
  .question-builder { position: relative; }
  .q-num-badge { position: absolute; top: -10px; left: 1rem; background: var(--navy); color: var(--teal); border: 1px solid var(--border); border-radius: 4px; padding: 0 .6rem; font-size: .72rem; font-family: var(--font-mono); }
  .options-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .correct-select { display: flex; gap: .5rem; margin-top: .75rem; flex-wrap: wrap; }
  .correct-opt { padding: .35rem .75rem; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: transparent; color: var(--muted); transition: all .15s; }
  .correct-opt:hover { border-color: var(--teal); color: var(--teal); }
  .correct-opt.selected { background: var(--teal); color: var(--navy); border-color: var(--teal); font-weight: 700; }
  </style>
</head>
<body data-theme="dark">

<nav class="navbar">
  <div class="navbar-brand">📋 Exam<span>Cloud</span></div>
  <div class="navbar-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/exams">Exams</a>
    <a href="/admin/students">Students</a>
    <a href="/admin/results">Results</a>
    <span class="nav-badge">ADMIN</span>
    <form method="GET" action="/logout" style="margin:0;">
      <button class="btn-logout">Logout</button>
    </form>
    <button class="theme-toggle" title="Toggle Theme" aria-label="Toggle light/dark mode"></button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div>
      <div class="breadcrumb"><a href="/admin">Dashboard</a> / <a href="/admin/exams">Exams</a></div>
      <h1>Create <span>New Exam</span></h1>
    </div>
  </div>

  <form method="POST" action="/admin/add_exam" id="examForm">

    <!-- EXAM DETAILS -->
    <div class="card mb-3">
      <div class="card-title">Exam Details</div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Exam Name</label>
          <input class="form-control" type="text" name="exam_name" placeholder="e.g. Python Fundamentals — Unit 1" required>
        </div>
        <div class="form-group">
          <label class="form-label">Duration (minutes)</label>
          <input class="form-control" type="number" name="duration" value="10" min="1" max="180" required>
        </div>
      </div>
    </div>

    <!-- QUESTIONS -->
    <div class="flex items-center justify-between mb-2">
      <h2 style="font-size:1.1rem;font-weight:700;">Questions <span id="qCount" class="text-teal">(0)</span></h2>
      <button type="button" class="btn btn-primary" id="addQBtn">+ Add Question</button>
    </div>

    <div id="questionsContainer"></div>

    <div class="flex gap-2 mt-3" style="margin-bottom:2rem;">
      <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" disabled>
        💾 Save & Submit Exam
      </button>
      <a href="/admin/exams" class="btn btn-outline btn-lg">Cancel</a>
    </div>

  </form>
</div>

<script>
let qNum = 0;
const letters = ['A', 'B', 'C', 'D'];

document.getElementById('addQBtn').addEventListener('click', addQuestion);

function addQuestion() {
  qNum++;
  updateQCount();
  const container = document.getElementById('questionsContainer');
  const div = document.createElement('div');
  div.className = 'question-builder card mb-3';
  div.id = 'qBlock_' + qNum;
  div.innerHTML = `
    <div class="q-num-badge">Q${qNum}</div>
    <button type="button" class="remove-btn" onclick="removeQuestion(${qNum})">✕</button>
    <div class="form-group">
      <label class="form-label">Question</label>
      <input class="form-control" type="text" name="question[]" placeholder="Enter your question here..." required>
    </div>
    <div class="options-grid-2">
      <div class="form-group">
        <label class="form-label">Option A</label>
        <input class="form-control" type="text" name="option1[]" placeholder="Option A" required>
      </div>
      <div class="form-group">
        <label class="form-label">Option B</label>
        <input class="form-control" type="text" name="option2[]" placeholder="Option B" required>
      </div>
      <div class="form-group">
        <label class="form-label">Option C</label>
        <input class="form-control" type="text" name="option3[]" placeholder="Option C" required>
      </div>
      <div class="form-group">
        <label class="form-label">Option D</label>
        <input class="form-control" type="text" name="option4[]" placeholder="Option D" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Correct Answer (1=A, 2=B, 3=C, 4=D)</label>
      <select class="form-control" name="correct[]" required>
        <option value="">Select correct option</option>
        <option value="1">A</option>
        <option value="2">B</option>
        <option value="3">C</option>
        <option value="4">D</option>
      </select>
    </div>
  `;
  container.appendChild(div);
  updateSubmitBtn();
  div.scrollIntoView({ behavior: 'smooth' });
}

function removeQuestion(num) {
  var block = document.getElementById('qBlock_' + num);
  if (block) {
    block.remove();
  }
  renumberQuestions();
  updateSubmitBtn();
  updateQCount();
}

function renumberQuestions() {
  var blocks = document.querySelectorAll('.question-builder');
  blocks.forEach(function(el, i) {
    el.querySelector('.q-num-badge').textContent = 'Q' + (i+1);
  });
}

function updateQCount() {
  var count = document.querySelectorAll('.question-builder').length;
  document.getElementById('qCount').textContent = '(' + count + ')';
}

function updateSubmitBtn() {
  var qs = document.querySelectorAll('.question-builder');
  var allFilled = true;
  qs.some(function(q) {
    var inputs = q.querySelectorAll('input[required], select[required]');
    for (var i = 0; i < inputs.length; i++) {
      if (!inputs[i].value.trim()) {
        allFilled = false;
        return true;
      }
    }
    return false;
  });
  document.getElementById('submitBtn').disabled = qs.length === 0 || !allFilled;
}
</script>

<script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
