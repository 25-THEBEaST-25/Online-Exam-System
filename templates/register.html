<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ExamCloud</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page-center">
  <div class="auth-box" style="max-width:480px;">

    <div class="auth-logo">
      <div class="auth-logo-icon">🎓</div>
      <h2>Create Account</h2>
      <p>Register as a student to take exams</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ '✓' if cat == 'success' else '✕' }} {{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="card">
      <form method="POST" action="/register">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-control" type="text" name="full_name" placeholder="Rahul Sharma" required>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-control" type="text" name="username" placeholder="rahul01" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" placeholder="rahul@mu.ac.in">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" placeholder="Choose a strong password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Register →</button>
      </form>
    </div>

    <p class="text-center text-sm text-muted mt-2">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
</body>
</html>
